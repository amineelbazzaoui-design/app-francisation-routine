name: Publier FITPILOT sur GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "fitpilot-src/**"
      - ".github/workflows/deploy-fitpilot-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstituer et compiler FITPILOT
        run: |
          base64 --decode fitpilot-src/src/App.jsx.gz.b64 | gzip --decompress > fitpilot-src/src/App.jsx
          cd fitpilot-src
          npm install
          npm run build

      - name: Préparer le site complet
        run: |
          mkdir -p _site/fitpilot
          cp index.html styles.css script.js _site/
          cp -R fitpilot-src/dist/. _site/fitpilot/
          touch _site/.nojekyll

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
